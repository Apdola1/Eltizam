<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d5c46">
<title>التزام - متابعة الصلوات الخمس</title>
<style>
  :root {
    --bg: #0b3d2e;
    --bg2: #0d5c46;
    --card: #ffffff;
    --ink: #133a2c;
    --muted: #7c9488;
    --gold: #d4af37;
    --green: #1e9e6a;
    --green-soft: #e6f6ee;
    --late: #e8a33d;
    --late-soft: #fdf3e2;
    --shadow: 0 8px 24px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "SF Arabic", "Segoe UI", Tahoma, sans-serif;
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
    color: var(--ink);
    min-height: 100vh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }

  header { text-align: center; color: #fff; padding: 8px 0 18px; }
  header h1 { margin: 0; font-size: 26px; letter-spacing: .5px; }
  header .sub { color: #bfe3d4; font-size: 14px; margin-top: 4px; }

  .datebar {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,.12); border-radius: 16px;
    padding: 10px 14px; color: #fff; margin-bottom: 16px;
    backdrop-filter: blur(6px);
  }
  .datebar button {
    background: rgba(255,255,255,.18); border: none; color: #fff;
    width: 38px; height: 38px; border-radius: 12px; font-size: 20px;
    cursor: pointer; transition: .15s; display: flex; align-items: center; justify-content: center;
  }
  .datebar button:active { transform: scale(.9); }
  .datebar button:disabled { opacity: .3; cursor: default; }
  .datebar .day { text-align: center; }
  .datebar .day .d1 { font-size: 16px; font-weight: 700; }
  .datebar .day .d2 { font-size: 12px; color: #bfe3d4; margin-top: 2px; }

  .prayers { display: flex; flex-direction: column; gap: 12px; }
  .prayer {
    background: var(--card); border-radius: 18px; padding: 16px 18px;
    display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
    transition: .2s; position: relative; overflow: hidden;
  }
  .prayer .icon {
    width: 46px; height: 46px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    background: var(--green-soft);
  }
  .prayer .info { flex: 1; }
  .prayer .name { font-size: 19px; font-weight: 700; }
  .prayer .state { font-size: 13px; color: var(--muted); margin-top: 3px; }

  .prayer .actions { display: flex; gap: 8px; }
  .btn {
    border: 2px solid #e3ebe7; background: #fff; border-radius: 12px;
    padding: 8px 12px; font-size: 13px; font-weight: 700; cursor: pointer;
    color: var(--muted); transition: .15s; white-space: nowrap;
  }
  .btn:active { transform: scale(.94); }

  /* states */
  .prayer.ontime { background: var(--green-soft); }
  .prayer.ontime .icon { background: var(--green); color: #fff; }
  .prayer.ontime .name { color: #0f7a52; }
  .prayer.ontime .state { color: #1e9e6a; font-weight: 700; }

  .prayer.late { background: var(--late-soft); }
  .prayer.late .icon { background: var(--late); color: #fff; }
  .prayer.late .state { color: #c67f1e; font-weight: 700; }

  .btn.on-active { background: var(--green); border-color: var(--green); color: #fff; }
  .btn.late-active { background: var(--late); border-color: var(--late); color: #fff; }

  .checkmark { font-size: 22px; }

  /* stats */
  .stats {
    margin-top: 22px; background: rgba(255,255,255,.10); border-radius: 18px;
    padding: 16px; color: #fff; backdrop-filter: blur(6px);
  }
  .stats h2 { margin: 0 0 12px; font-size: 16px; color: var(--gold); }
  .stat-row { display: flex; gap: 10px; }
  .stat {
    flex: 1; background: rgba(255,255,255,.10); border-radius: 14px;
    padding: 12px 8px; text-align: center;
  }
  .stat .num { font-size: 24px; font-weight: 800; color: #fff; }
  .stat .lbl { font-size: 11px; color: #bfe3d4; margin-top: 3px; }
  .bar { height: 10px; background: rgba(255,255,255,.15); border-radius: 8px; overflow: hidden; margin-top: 14px; }
  .bar > div { height: 100%; background: linear-gradient(90deg, var(--gold), #f0d47a); border-radius: 8px; transition: width .4s; }
  .bar-lbl { font-size: 12px; color: #bfe3d4; margin-top: 6px; text-align: center; }

  .today-btn {
    display: block; margin: 16px auto 0; background: var(--gold); color: #3a2e08;
    border: none; padding: 10px 20px; border-radius: 14px; font-weight: 800;
    font-size: 14px; cursor: pointer;
  }
  footer { text-align: center; color: #bfe3d4; font-size: 12px; margin-top: 26px; }

  /* auth */
  .auth-bar { margin-bottom: 8px; }
  .auth-btn {
    width: 100%; border: none; border-radius: 14px; padding: 12px 14px;
    background: #fff; color: #133a2c; font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: var(--shadow); transition: .15s;
  }
  .auth-btn:active { transform: scale(.97); }
  .auth-btn.ghost { width: auto; background: rgba(255,255,255,.15); color: #fff; box-shadow: none; padding: 8px 16px; }
  .auth-btn.light { background: rgba(255,255,255,.9); color: #133a2c; }
  .auth-form {
    background: rgba(255,255,255,.10); border-radius: 16px; padding: 12px;
    display: flex; flex-direction: column; gap: 8px; backdrop-filter: blur(6px);
  }
  .auth-input {
    width: 100%; border: none; border-radius: 12px; padding: 12px 14px;
    font-size: 15px; font-family: inherit; background: #fff; color: #133a2c;
  }
  .auth-input:focus { outline: 2px solid var(--gold); }
  .auth-row { display: flex; gap: 8px; }
  .auth-row .auth-btn { flex: 1; }
  .auth-msg { color: #f2c94c; font-size: 12px; text-align: center; min-height: 14px; }
  .auth-bar:has(.acc) { display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,.12); border-radius: 14px; padding: 8px 12px; }
  .acc { display: flex; align-items: center; gap: 10px; color: #fff; font-size: 14px; font-weight: 700; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; }
  .sync { text-align: center; font-size: 12px; color: #bfe3d4; margin-bottom: 14px; }
  .sync.ok { color: #9fe7c4; }
  .sync.warn { color: #f2c94c; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>التزام</h1>
    <div class="sub">تابع صلواتك الخمس والتزامك بأوقاتها</div>
  </header>

  <div id="authBar" class="auth-bar"></div>
  <div id="syncState" class="sync">محلي فقط</div>

  <div class="datebar">
    <button id="prevDay" aria-label="اليوم السابق">›</button>
    <div class="day">
      <div class="d1" id="hijriLabel">—</div>
      <div class="d2" id="greLabel">—</div>
    </div>
    <button id="nextDay" aria-label="اليوم التالي">‹</button>
  </div>

  <div class="prayers" id="prayers"></div>

  <button class="today-btn" id="todayBtn">اليوم</button>

  <div class="stats">
    <h2>إحصائية الالتزام</h2>
    <div class="stat-row">
      <div class="stat"><div class="num" id="stStreak">0</div><div class="lbl">أيام متتالية كاملة</div></div>
      <div class="stat"><div class="num" id="stMonth">0</div><div class="lbl">صلوات هذا الشهر</div></div>
      <div class="stat"><div class="num" id="stOntime">0%</div><div class="lbl">في وقتها</div></div>
    </div>
    <div class="bar"><div id="dayBar" style="width:0%"></div></div>
    <div class="bar-lbl" id="dayBarLbl">صلوات اليوم: 0 من 5</div>
  </div>

  <footer>بياناتك محفوظة على جهازك فقط · اللهم اجعلنا من المحافظين على الصلاة</footer>
</div>

<script type="module">
// ===== Firebase =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGu4jbeaO_qRIHWS-8E-dIn-fpWXdIA_k",
  authDomain: "eltizam-ab.firebaseapp.com",
  projectId: "eltizam-ab",
  storageBucket: "eltizam-ab.firebasestorage.app",
  messagingSenderId: "400305927841",
  appId: "1:400305927841:web:c762d94d38dedd5222a2e0",
  measurementId: "G-B0ML3G3PJS"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

let user = null;         // current signed-in user
let userDocRef = null;   // Firestore doc for this user
let unsub = null;        // realtime listener unsubscribe
let applyingRemote = false; // guard to avoid write-echo loops

// merge two data objects (day -> {prayer: state}); incomingWins decides conflicts
function mergeData(base, incoming, incomingWins) {
  const out = JSON.parse(JSON.stringify(base || {}));
  for (const [day, prayers] of Object.entries(incoming || {})) {
    out[day] = out[day] || {};
    for (const [pk, st] of Object.entries(prayers)) {
      if (incomingWins || !(pk in out[day])) out[day][pk] = st;
    }
    if (Object.keys(out[day]).length === 0) delete out[day];
  }
  return out;
}

function setSync(text, cls) {
  const el = document.getElementById('syncState');
  if (el) { el.textContent = text; el.className = 'sync ' + (cls || ''); }
}

async function pushToCloud() {
  if (!userDocRef) return;
  try {
    await setDoc(userDocRef, { days: data, updatedAt: Date.now() }, { merge: false });
    setSync('☁︎ متزامن', 'ok');
  } catch (e) {
    setSync('⚠︎ لم تتم المزامنة (سيُعاد المحاولة)', 'warn');
  }
}

async function onSignedIn(u) {
  user = u;
  userDocRef = doc(db, 'users', u.uid);
  renderAuth();
  setSync('… جارِ المزامنة', '');
  try {
    // 1) pull remote once, union with local (local wins to keep offline edits)
    const snap = await getDoc(userDocRef);
    const remote = snap.exists() ? (snap.data().days || {}) : {};
    data = mergeData(data, remote, false);
    save(true); render();
    // 2) push merged result up
    await pushToCloud();
    // 3) live-sync future changes from other devices
    if (unsub) unsub();
    unsub = onSnapshot(userDocRef, (s) => {
      if (!s.exists()) return;
      const remoteDays = s.data().days || {};
      applyingRemote = true;
      data = mergeData(data, remoteDays, true);
      save(true); render();
      applyingRemote = false;
      setSync('☁︎ متزامن', 'ok');
    });
  } catch (e) {
    setSync('⚠︎ تعذّر الاتصال', 'warn');
  }
}

function onSignedOut() {
  user = null; userDocRef = null;
  if (unsub) { unsub(); unsub = null; }
  renderAuth();
  setSync('محلي فقط', '');
}

function renderAuth() {
  const bar = document.getElementById('authBar');
  if (!bar) return;
  if (user) {
    const name = user.displayName || user.email || 'مستخدم';
    const photo = user.photoURL ? `<img src="${user.photoURL}" alt="" class="avatar">` : '👤';
    bar.innerHTML = `
      <div class="acc">${photo}<span>${name}</span></div>
      <button id="signOutBtn" class="auth-btn ghost">خروج</button>`;
    document.getElementById('signOutBtn').onclick = () => signOut(auth);
  } else {
    bar.innerHTML = `
      <form id="authForm" class="auth-form" autocomplete="on">
        <input id="authEmail" class="auth-input" type="email" inputmode="email"
               placeholder="البريد الإلكتروني" autocomplete="email" required>
        <input id="authPass" class="auth-input" type="password"
               placeholder="كلمة المرور (٦ أحرف فأكثر)" autocomplete="current-password" minlength="6" required>
        <div class="auth-row">
          <button type="submit" class="auth-btn" data-mode="in">دخول</button>
          <button type="button" id="signUpBtn" class="auth-btn ghost light">حساب جديد</button>
        </div>
        <div id="authMsg" class="auth-msg"></div>
      </form>`;
    const form = document.getElementById('authForm');
    const emailEl = document.getElementById('authEmail');
    const passEl = document.getElementById('authPass');
    const submit = async (mode) => {
      const email = emailEl.value.trim();
      const pass = passEl.value;
      if (!email || pass.length < 6) { showAuthMsg('اكتب بريداً صحيحاً وكلمة مرور من ٦ أحرف فأكثر'); return; }
      showAuthMsg('… جارِ المعالجة');
      try {
        if (mode === 'up') await createUserWithEmailAndPassword(auth, email, pass);
        else await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) { showAuthMsg(authErrorText(e.code)); }
    };
    form.onsubmit = (ev) => { ev.preventDefault(); submit('in'); };
    document.getElementById('signUpBtn').onclick = () => submit('up');
  }
}

function showAuthMsg(t) { const m = document.getElementById('authMsg'); if (m) m.textContent = t; }

function authErrorText(code) {
  switch (code) {
    case 'auth/invalid-email': return 'صيغة البريد غير صحيحة';
    case 'auth/email-already-in-use': return 'البريد مسجّل مسبقاً — اضغط «دخول»';
    case 'auth/weak-password': return 'كلمة المرور ضعيفة (٦ أحرف فأكثر)';
    case 'auth/invalid-credential':
    case 'auth/wrong-password':
    case 'auth/user-not-found': return 'البريد أو كلمة المرور غير صحيحة';
    case 'auth/too-many-requests': return 'محاولات كثيرة — انتظر قليلاً ثم أعد المحاولة';
    case 'auth/network-request-failed': return 'تعذّر الاتصال بالشبكة';
    case 'auth/operation-not-allowed': return 'فعّل «البريد/كلمة المرور» في إعدادات Firebase';
    default: return 'تعذّر تسجيل الدخول، حاول مجدداً';
  }
}

onAuthStateChanged(auth, (u) => { if (u) onSignedIn(u); else onSignedOut(); });

// ===== App =====
const PRAYERS = [
  { key: 'fajr',    name: 'الفجر',   icon: '🌅' },
  { key: 'dhuhr',   name: 'الظهر',   icon: '☀️' },
  { key: 'asr',     name: 'العصر',   icon: '🌇' },
  { key: 'maghrib', name: 'المغرب',  icon: '🌆' },
  { key: 'isha',    name: 'العشاء',  icon: '🌙' },
];
const STORAGE_KEY = 'iltizam_data_v1';

let data = load();
let current = new Date();

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function save(localOnly) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  // push to cloud on user-initiated changes (not while applying remote snapshots)
  if (!localOnly && userDocRef && !applyingRemote) pushToCloud();
}

function dayKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function getDay(d) { return data[dayKey(d)] || {}; }

function setState(d, prayerKey, state) {
  const k = dayKey(d);
  if (!data[k]) data[k] = {};
  if (state === null) delete data[k][prayerKey];
  else data[k][prayerKey] = state; // 'ontime' | 'late'
  if (Object.keys(data[k]).length === 0) delete data[k];
  save();
  render();
}

function fmtHijri(d) {
  try {
    return new Intl.DateTimeFormat('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' }).format(d);
  } catch { return null; }
}
function fmtGre(d) {
  return new Intl.DateTimeFormat('ar', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
}

function render() {
  // date labels
  const hijri = fmtHijri(current);
  document.getElementById('hijriLabel').textContent = hijri || fmtGre(current);
  document.getElementById('greLabel').textContent = hijri ? fmtGre(current) : '';

  // disable next if current is today or future
  const today = new Date(); today.setHours(0,0,0,0);
  const cur = new Date(current); cur.setHours(0,0,0,0);
  document.getElementById('nextDay').disabled = cur >= today;

  // prayers
  const day = getDay(current);
  const container = document.getElementById('prayers');
  container.innerHTML = '';
  PRAYERS.forEach(p => {
    const st = day[p.key]; // undefined | 'ontime' | 'late'
    const el = document.createElement('div');
    el.className = 'prayer' + (st === 'ontime' ? ' ontime' : st === 'late' ? ' late' : '');
    const stateText = st === 'ontime' ? '✓ صُلّيت في وقتها' : st === 'late' ? 'صُلّيت (فائتة/متأخرة)' : 'لم تُسجّل بعد';
    el.innerHTML = `
      <div class="icon">${st ? (st==='ontime'?'✅':'🕐') : p.icon}</div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="state">${stateText}</div>
      </div>
      <div class="actions">
        <button class="btn ${st==='ontime'?'on-active':''}" data-p="${p.key}" data-s="ontime">في وقتها</button>
        <button class="btn ${st==='late'?'late-active':''}" data-p="${p.key}" data-s="late">قضاء</button>
      </div>`;
    container.appendChild(el);
  });

  container.querySelectorAll('.btn').forEach(b => {
    b.addEventListener('click', () => {
      const day = getDay(current);
      const cur = day[b.dataset.p];
      const next = cur === b.dataset.s ? null : b.dataset.s; // toggle off if same
      setState(current, b.dataset.p, next);
    });
  });

  renderStats();
}

function renderStats() {
  // today progress
  const day = getDay(current);
  const done = PRAYERS.filter(p => day[p.key]).length;
  document.getElementById('dayBar').style.width = (done/5*100) + '%';
  document.getElementById('dayBarLbl').textContent = `صلوات اليوم: ${done} من 5`;

  // streak of full days (all 5, any state) up to today
  let streak = 0;
  const d = new Date(); d.setHours(0,0,0,0);
  while (true) {
    const dd = getDay(d);
    if (PRAYERS.every(p => dd[p.key])) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  document.getElementById('stStreak').textContent = streak;

  // this month totals
  const now = new Date();
  let monthCount = 0, ontime = 0, total = 0;
  Object.entries(data).forEach(([k, v]) => {
    const [y,m] = k.split('-').map(Number);
    Object.values(v).forEach(s => {
      total++;
      if (s === 'ontime') ontime++;
      if (y === now.getFullYear() && m === now.getMonth()+1) monthCount++;
    });
  });
  document.getElementById('stMonth').textContent = monthCount;
  document.getElementById('stOntime').textContent = total ? Math.round(ontime/total*100) + '%' : '0%';
}

document.getElementById('prevDay').addEventListener('click', () => {
  current.setDate(current.getDate()-1); render();
});
document.getElementById('nextDay').addEventListener('click', () => {
  const today = new Date(); today.setHours(0,0,0,0);
  const cur = new Date(current); cur.setHours(0,0,0,0);
  if (cur < today) { current.setDate(current.getDate()+1); render(); }
});
document.getElementById('todayBtn').addEventListener('click', () => {
  current = new Date(); render();
});

render();
</script>
</body>
</html>
